[server]
host = "127.0.0.1"
port = 3000

[database]
path = "./anima.db"

# Embedding backend: "local" (default, ONNX), "openai", or "openai_compat".
# Local runs offline with no API calls. "openai" and "openai_compat" both use the
# OpenAI-compatible embedding API — works with OpenAI, Cohere, Voyage, Together, vLLM, etc.
# API key resolution: config value > EMBEDDING_API_KEY env > OPENAI_API_KEY env.
[embedding]
backend = "local"
model_dir = "./models/bge-m3"
model_url = "https://huggingface.co/aapot/bge-m3-onnx/resolve/main/model.onnx"
tokenizer_url = "https://huggingface.co/aapot/bge-m3-onnx/resolve/main/tokenizer.json"
dimension = 1024
pooling = "mean"
# To use Qwen3-Embedding-0.6B instead (512d, faster, slightly lower recall):
#   model_dir = "./models/qwen3-embedding-0.6b"
#   model_url = "https://huggingface.co/onnx-community/Qwen3-Embedding-0.6B-ONNX/resolve/main/onnx/model_int8.onnx"
#   tokenizer_url = "https://huggingface.co/onnx-community/Qwen3-Embedding-0.6B-ONNX/resolve/main/tokenizer.json"
#   dimension = 512
#   pooling = "last_token"
#   query_instruction = "Instruct: Given a question about someone's memories or past conversations, retrieve the most relevant memory excerpts\nQuery:"
# To use OpenAI text-embedding-3-small:
#   backend = "openai"
#   api_base_url = "https://api.openai.com/v1"
#   api_model = "text-embedding-3-small"
#   api_key = ""  # or set OPENAI_API_KEY env var
#   dimension = 1536
# To use Cohere embed-v4.0:
#   backend = "openai_compat"
#   api_base_url = "https://api.cohere.com/compatibility/v1"
#   api_model = "embed-v4.0"
#   api_key = ""  # or set EMBEDDING_API_KEY env var
#   dimension = 1024
# To use Voyage voyage-3-large:
#   backend = "openai_compat"
#   api_base_url = "https://api.voyageai.com/v1"
#   api_model = "voyage-3-large"
#   api_key = ""  # or set EMBEDDING_API_KEY env var
#   dimension = 1024

[search]
rrf_k = 60.0
weight_vector = 0.6
weight_keyword = 0.4
temporal_weight = 0.2
# Global temporal decay rate. Per-category overrides are applied automatically:
# identity=0.00001 (~permanent), preference=0.0001, environment=0.0005,
# routine=0.0003, task=0.005 (~6d half-life), inferred/general=0.001 (~29d half-life).
temporal_lambda = 0.001
similarity_threshold = 0.85
# Minimum cosine similarity for vector search results.
# Tune this per embedding model and domain to filter noise.
min_vector_similarity = 0.50
# Minimum spread between best and worst vector scores to accept results.
# Set to 0 to disable.
min_score_spread = 0.0
# Score bonus per tier level above tier-1 (raw).
# tier 1 (raw) → +0.000, tier 2 (reflected) → +0.025, tier 3 (deduced) → +0.050
tier_boost = 0.05

[consolidation]
enabled = true
backend = "ollama"

[consolidation.ollama]
base_url = "http://localhost:11434"
model = "qwen3.5:4b"

# Example: use any OpenAI-compatible endpoint (Groq, Together, vLLM, etc.)
[consolidation.openai_compat]
base_url = "https://api.example.com/v1"
api_key = ""
model = "your-model-name"

# LLM used for /ask, /chat, and answer generation.
# Point at any OpenAI-compatible endpoint.
[llm]
base_url = "http://localhost:11434/v1"
model = "qwen3.5:4b"
api_key = ""

# LLM for background processor (reflection + deduction).
# Uses a stronger model for better reasoning quality.
# API key resolution: config value > PROCESSOR_API_KEY env > OPENAI_API_KEY env.
[processor]
enabled = true
base_url = "http://localhost:11434/v1"
model = "qwen3.5:4b"
api_key = ""

# Cross-encoder re-ranker for improved retrieval quality.
# Downloads bge-reranker-v2-m3 INT8 (571MB) on first use.
# Disabled by default — enable for better natural language query results.
[reranker]
enabled = true
model_dir = "./models/bge-reranker-v2-m3"
model_url = "https://huggingface.co/onnx-community/bge-reranker-v2-m3-ONNX/resolve/main/onnx/model_int8.onnx"
tokenizer_url = "https://huggingface.co/onnx-community/bge-reranker-v2-m3-ONNX/resolve/main/tokenizer.json"
max_length = 512
top_n = 10

# Memory categories with custom decay rates.
# Use half_life_days — after that many days, a memory's temporal score drops to 50%.
# Built-in defaults: identity=2888d, preference=289d, environment=58d,
# routine=96d, task=6d, inferred=29d, general=29d.
# Override any built-in or add your own:
# [categories.health]
# half_life_days = 144
# [categories.finance]
# half_life_days = 58
# [categories.task]
# half_life_days = 3     # override built-in: expire tasks faster

# --- Provider Profiles (optional, overrides [llm]/[processor]/[consolidation]) ---
# Named LLM profiles. Each is an OpenAI-compatible endpoint.
# Multiple profiles can share the same endpoint with different models.
# When [profiles] is defined, [routing] controls which profile each operation uses.
# If [profiles] is absent, legacy [llm]/[processor]/[consolidation] sections are used.
#
# [profiles.fast]
# base_url = "http://localhost:11434/v1"
# model = "qwen3.5:4b"
#
# [profiles.strong]
# base_url = "http://localhost:11434/v1"
# model = "qwen3:32b"
#
# [profiles.cloud]
# base_url = "https://api.groq.com/openai/v1"
# model = "qwen/qwen3-32b"
# api_key = ""  # or set CLOUD_API_KEY env var
#
# [routing]
# ask = "strong"           # /ask answer generation
# chat = "fast"            # /chat replies
# processor = "cloud"      # reflection/deduction
# consolidation = "fast"   # memory consolidation

# Anonymous usage telemetry. Set enabled = false to opt out.
# Sends only: model names, memory counts, OS info, feature flags.
# Never sends: memory content, namespace names, API keys.
[telemetry]
enabled = true
endpoint = "https://telemetry.anima-memory.dev/v1/report"
interval_secs = 86400
